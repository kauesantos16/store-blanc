<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blanc Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET
   ============================================================ */
#blb *, #blb *::before, #blb *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; margin: 0; padding: 0; }

/* ============================================================
   BUILDER SHELL
   ============================================================ */
#blb {
  --blk: #111111;
  --wht: #ffffff;
  --g1: #f9f9f9;
  --g2: #f2f2f2;
  --g3: #e5e5e5;
  --g4: #cccccc;
  --g5: #999999;
  --g6: #595959;
  --lw: 220px;
  --rw: 292px;
  --th: 46px;
  font-family: 'Inter', sans-serif;
  background: var(--g2);
  color: var(--blk);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* TOPBAR */
#blb .topbar {
  height: var(--th);
  background: var(--blk);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  z-index: 200;
}
#blb .brand { display: flex; align-items: center; gap: 12px; color: #fff; }
#blb .brand-name { font-size: .78rem; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; }
#blb .brand-sep { width: 1px; height: 14px; background: rgba(255,255,255,.2); }
#blb .brand-sub { font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.4); font-weight: 400; }
#blb .btn-exp {
  background: #fff; color: var(--blk); border: none; padding: 6px 16px;
  font-family: 'Inter', sans-serif; font-size: .66rem; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: background .15s;
}
#blb .btn-exp:hover { background: var(--g3); }

/* SHELL */
#blb .shell { display: flex; flex: 1; overflow: hidden; }

/* LEFT SIDEBAR */
#blb .sb-left {
  width: var(--lw); background: var(--wht); border-right: 1px solid var(--g3);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
}
#blb .sb-hd { padding: 14px 14px 12px; border-bottom: 1px solid var(--g3); flex-shrink: 0; }
#blb .sb-lbl { font-size: .6rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--g5); }
#blb .sec-list { flex: 1; overflow-y: auto; padding: 8px; }

/* MODEL PICKER */
#blb .model-pick { display: flex; gap: 4px; margin-bottom: 10px; }
#blb .mp-btn {
  flex: 1; background: none; border: 1.5px solid var(--g3); border-radius: 3px;
  padding: 5px 4px; font-family: 'Inter', sans-serif; font-size: .6rem; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase; color: var(--g5);
  cursor: pointer; transition: all .12s; line-height: 1.3; text-align: center;
}
#blb .mp-btn:hover { border-color: var(--blk); color: var(--blk); }
#blb .mp-btn.active { background: var(--blk); border-color: var(--blk); color: #fff; }

/* ADD SECTION MENU */
#blb .add-wrap { position: relative; margin-bottom: 8px; }
#blb .btn-add-sec {
  width: 100%; background: none; border: 1.5px dashed var(--g3); border-radius: 3px;
  padding: 7px 10px; font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600;
  color: var(--g6); cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  transition: border-color .12s, color .12s; letter-spacing: .04em;
}
#blb .btn-add-sec:hover { border-color: var(--blk); color: var(--blk); }
#blb .sec-menu {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--wht); border: 1px solid var(--g3); border-radius: 3px;
  box-shadow: 0 6px 24px rgba(0,0,0,.12); z-index: 300; overflow: hidden;
  display: none; animation: blb-fd .12s ease;
}
#blb .sec-menu.open { display: block; }
@keyframes blb-fd { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
#blb .sm-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 11px; cursor: pointer;
  font-size: .78rem; color: var(--blk); transition: background .1s;
  border-bottom: 1px solid var(--g2);
}
#blb .sm-item:last-child { border-bottom: none; }
#blb .sm-item:hover { background: var(--g1); }
#blb .sm-item-name { font-weight: 500; font-size: .76rem; }
#blb .sm-item-tag {
  font-size: .55rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  padding: 1px 5px; border-radius: 2px; margin-left: auto; flex-shrink: 0;
}
#blb .sm-item-tag.ed { background: var(--g2); color: var(--g6); }
#blb .sm-item-tag.fx { background: var(--g1); color: var(--g5); }

/* SECTION ITEM */
#blb .si {
  display: flex; align-items: center; gap: 6px; padding: 7px 8px;
  border: 1px solid transparent; border-radius: 3px; cursor: pointer;
  transition: all .12s; margin-bottom: 2px; user-select: none;
}
#blb .si:hover { background: var(--g1); border-color: var(--g3); }
#blb .si.active { background: var(--blk); border-color: var(--blk); }
#blb .si-num { font-size: .6rem; font-weight: 600; color: var(--g5); width: 14px; flex-shrink: 0; text-align: center; }
#blb .si.active .si-num { color: rgba(255,255,255,.35); }
#blb .si-info { flex: 1; min-width: 0; }
#blb .si-name { font-size: .76rem; font-weight: 500; color: var(--blk); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#blb .si.active .si-name { color: #fff; }
#blb .si-acts { display: flex; gap: 1px; flex-shrink: 0; opacity: 0; transition: opacity .1s; }
#blb .si:hover .si-acts, #blb .si.active .si-acts { opacity: 1; }
#blb .si-btn {
  width: 20px; height: 20px; border: none; background: none; cursor: pointer;
  border-radius: 2px; display: flex; align-items: center; justify-content: center;
  font-size: .6rem; color: var(--g5); transition: background .1s, color .1s;
}
#blb .si.active .si-btn { color: rgba(255,255,255,.5); }
#blb .si-btn:hover { background: rgba(0,0,0,.08); color: var(--blk); }
#blb .si.active .si-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
#blb .si-btn.del:hover { background: #ffeaea !important; color: #c0392b !important; }

/* CENTER */
#blb .center { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#blb .cbar {
  height: 34px; background: var(--g1); border-bottom: 1px solid var(--g3);
  display: flex; align-items: center; padding: 0 14px; gap: 10px; flex-shrink: 0;
}
#blb .cbar-lbl { font-size: .6rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--g5); }
#blb .wdots { display: flex; gap: 5px; }
#blb .wdots span { width: 9px; height: 9px; border-radius: 50%; }
#blb .cbody { flex: 1; overflow-y: auto; padding: 20px; }
#blb .cbody::-webkit-scrollbar { width: 5px; }
#blb .cbody::-webkit-scrollbar-thumb { background: var(--g3); border-radius: 3px; }
#blb .pframe {
  background: var(--wht); border: 1px solid var(--g3);
  box-shadow: 0 2px 16px rgba(0,0,0,.07); max-width: 900px; margin: 0 auto; overflow: hidden;
}

/* RIGHT SIDEBAR */
#blb .sb-right {
  width: var(--rw); background: var(--wht); border-left: 1px solid var(--g3);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; transition: width .2s ease;
}
#blb .sb-right.collapsed { width: 0; border-left: none; }
#blb .ed-hd {
  height: 34px; background: var(--g1); border-bottom: 1px solid var(--g3);
  display: flex; align-items: center; padding: 0 12px; gap: 7px; flex-shrink: 0;
}
#blb .ed-hd-title {
  font-size: .72rem; font-weight: 600; color: var(--blk); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .03em;
}
#blb .ed-bd { flex: 1; overflow-y: auto; padding: 10px; }
#blb .ed-bd::-webkit-scrollbar { width: 4px; }
#blb .ed-bd::-webkit-scrollbar-thumb { background: var(--g3); border-radius: 2px; }
#blb .ed-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 6px; color: var(--g5); font-size: .76rem; text-align: center;
  padding: 24px; line-height: 1.6;
}

/* PANELS */
#blb .ep { border: 1px solid var(--g3); border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
#blb .ep:last-child { margin-bottom: 0; }
#blb .ep-hd {
  background: var(--g1); border-bottom: 1px solid var(--g3); padding: 7px 11px;
  display: flex; align-items: center; gap: 6px;
  font-size: .62rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--g6);
}
#blb .ep-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blk); flex-shrink: 0; }
#blb .ep-bd { padding: 10px; }
#blb .fr { margin-bottom: 9px; }
#blb .fr:last-child { margin-bottom: 0; }
#blb label.lb {
  display: block; font-size: .59rem; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--g5); margin-bottom: 3px;
}
#blb input[type=text].inp, #blb textarea.inp {
  width: 100%; background: var(--g1); border: 1px solid var(--g3); border-radius: 2px;
  padding: 6px 9px; font-family: 'Inter', sans-serif; font-size: .8rem; color: var(--blk);
  outline: none; transition: border-color .15s; resize: none;
}
#blb input[type=text].inp:focus, #blb textarea.inp:focus { border-color: var(--blk); }
#blb textarea.inp { line-height: 1.55; }
#blb .hint { font-size: .64rem; color: var(--g5); margin-top: 3px; font-style: italic; }
#blb .rte-wrap { border: 1px solid var(--g3); border-radius: 2px; background: var(--g1); transition: border-color .15s; }
#blb .rte-wrap:focus-within { border-color: var(--blk); }
#blb .rte-toolbar { display: flex; align-items: center; gap: 2px; padding: 4px 6px; border-bottom: 1px solid var(--g3); background: var(--g2); }
#blb .rte-btn { display: flex; align-items: center; justify-content: center; width: 26px; height: 24px; background: none; border: 1px solid transparent; border-radius: 2px; font-family: 'Inter', sans-serif; font-size: .78rem; color: var(--g6); cursor: pointer; transition: all .1s; }
#blb .rte-btn:hover { background: var(--g3); border-color: var(--g3); color: var(--blk); }
#blb .rte-btn.active { background: var(--blk); border-color: var(--blk); color: #fff; }
#blb .rte-sep { width: 1px; height: 16px; background: var(--g3); margin: 0 3px; }
#blb .rte-body { padding: 8px 9px; font-family: 'Inter', sans-serif; font-size: .8rem; color: var(--blk); line-height: 1.6; min-height: 110px; outline: none; cursor: text; }
#blb .rte-body:empty::before { content: attr(data-placeholder); color: var(--g4); pointer-events: none; }

/* REPEATABLE */
#blb .rl { display: flex; flex-direction: column; gap: 5px; margin-bottom: 7px; }
#blb .ri { border: 1px solid var(--g3); border-radius: 2px; background: var(--g1); }
#blb .ri-hd {
  display: flex; align-items: center; gap: 5px; padding: 4px 7px;
  background: var(--g2); border-bottom: 1px solid var(--g3);
}
#blb .ri-num { font-size: .57rem; font-weight: 700; color: var(--g5); background: var(--g3); border-radius: 2px; padding: 1px 4px; }
#blb .ri-lbl { flex: 1; font-size: .68rem; font-weight: 500; color: var(--g6); }
#blb .ri-del {
  background: none; border: none; cursor: pointer; color: var(--g5);
  font-size: .65rem; padding: 2px 4px; border-radius: 2px;
  font-family: 'Inter', sans-serif; transition: background .12s, color .12s;
}
#blb .ri-del:hover { background: #ffeaea; color: #c0392b; }
#blb .ri-bd { padding: 6px; }
#blb .btn-ai {
  width: 100%; background: none; border: 1.5px dashed var(--g3); border-radius: 2px;
  padding: 6px; font-family: 'Inter', sans-serif; font-size: .72rem; color: var(--g6);
  cursor: pointer; font-weight: 500; transition: border-color .12s, color .12s;
}
#blb .btn-ai:hover { border-color: var(--blk); color: var(--blk); }

/* FIXED NOTICE */
#blb .fn { background: var(--g1); border: 1px solid var(--g3); border-radius: 3px; padding: 12px; }
#blb .fn-title { font-size: .76rem; font-weight: 600; color: var(--blk); margin-bottom: 2px; }
#blb .fn-sub { font-size: .68rem; color: var(--g5); line-height: 1.5; }

/* EXPORT MODAL */
#blb .eo {
  position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 500;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
#blb .eo.open { display: flex; }
#blb .em {
  background: var(--wht); width: 100%; max-width: 720px; max-height: 90vh;
  display: flex; flex-direction: column; overflow: hidden;
  border: 1px solid var(--g3); animation: blb-up .16s ease;
}
@keyframes blb-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
#blb .em-hd {
  background: var(--blk); padding: 13px 16px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
#blb .em-hd h2 { color: #fff; font-size: .76rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
#blb .em-hd-r { display: flex; gap: 8px; align-items: center; }
#blb .btn-cp {
  background: #fff; border: none; color: var(--blk); padding: 5px 12px;
  font-size: .64rem; font-family: 'Inter', sans-serif; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: background .12s;
}
#blb .btn-cp:hover { background: var(--g3); }
#blb .btn-cp.ok { background: #27ae60; color: #fff; }
#blb .btn-cx {
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2); color: #fff;
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: .8rem; transition: background .12s;
}
#blb .btn-cx:hover { background: rgba(255,255,255,.28); }
#blb .em-tabs {
  display: flex; align-items: center; background: var(--g1); border-bottom: 1px solid var(--g3);
  padding: 0 14px; flex-shrink: 0; gap: 2px;
}
#blb .em-tab {
  background: none; border: none; border-bottom: 2px solid transparent;
  padding: 8px 12px; font-family: 'Inter', sans-serif; font-size: .66rem;
  font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--g5);
  cursor: pointer; transition: color .12s, border-color .12s; margin-bottom: -1px;
}
#blb .em-tab:hover { color: var(--blk); }
#blb .em-tab.active { color: var(--blk); border-bottom-color: var(--blk); }
#blb .em-tab-dev {
  background: none; border: none; border-bottom: 2px solid transparent;
  padding: 8px 10px; font-family: 'Inter', sans-serif; font-size: .6rem;
  font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--g4);
  cursor: pointer; transition: color .12s, border-color .12s; margin-bottom: -1px;
}
#blb .em-tab-dev:hover { color: var(--g6); }
#blb .em-tab-dev.active { color: var(--g6); border-bottom-color: var(--g4); }
#blb .em-tabs-sep {
  width: 1px; height: 16px; background: var(--g3); margin: 0 6px; flex-shrink: 0;
}
#blb .em-tabs-devlabel {
  font-family: 'Inter', sans-serif; font-size: .55rem; letter-spacing: .1em;
  text-transform: uppercase; color: var(--g4); font-weight: 500; padding: 0 2px;
  white-space: nowrap;
}
#blb .em-info {
  background: #fffbe6; border-bottom: 1px solid #e8d96a;
  padding: 8px 14px; font-size: .74rem; color: #6b5000; flex-shrink: 0; line-height: 1.55;
}
#blb .em-info.dev {
  background: var(--g2); border-bottom: 1px solid var(--g3); color: var(--g5);
}
#blb .em-body { overflow-y: auto; flex: 1; }
#blb .cw { background: #0d1117; }
#blb .ct {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 13px; background: #161b22; border-bottom: 1px solid #30363d;
}
#blb .clang { font-size: .62rem; color: #6e7681; letter-spacing: .05em; }
#blb .ca {
  color: #e6edf3; font-family: 'Courier New', monospace; font-size: .68rem;
  line-height: 1.65; padding: 13px 15px; overflow-x: auto; white-space: pre;
  max-height: 54vh; overflow-y: auto;
}
#blb .ca::-webkit-scrollbar { width: 4px; height: 4px; }
#blb .ca::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

/* TOAST */
#blb .toast {
  position: fixed; bottom: 18px; right: 18px; background: var(--blk); color: #fff;
  padding: 8px 14px; font-size: .75rem; font-family: 'Inter', sans-serif;
  letter-spacing: .03em; box-shadow: 0 3px 14px rgba(0,0,0,.2);
  transform: translateY(50px); opacity: 0; transition: transform .22s, opacity .22s; z-index: 999;
}
#blb .toast.on { transform: translateY(0); opacity: 1; }

/* ============================================================
   BLANC PREVIEW STYLES  (scoped under #blb .pframe)
   ============================================================ */
#blb .pframe { font-family: 'Montserrat', sans-serif; color: #111; }
#blb .pframe .px { padding-left: 40px; padding-right: 40px; }

/* Resumo */
#blb .pframe .blanc-section-description { padding-top: 64px; padding-bottom: 64px; }
#blb .pframe .blanc-text-description { max-width: 720px; font-size: 1rem; font-weight: 400; line-height: 1.65; letter-spacing: .02em; color: #111; }
#blb .pframe .blanc-text-description strong { font-weight: 700; }
#blb .pframe .blanc-text-description em { font-style: italic; }

/* Slide marquee */
#blb .pframe .blanc-section-slide {
  width: 100%; overflow: hidden; white-space: nowrap; display: flex; position: relative;
  padding: 12px 0;
}
#blb .pframe .blanc-marquee-gradient { width: 40px; height: 100%; position: absolute; z-index: 1; top: 0; }
#blb .pframe .blanc-marquee-gradient.left { background: linear-gradient(to right,#fff 0%,transparent 100%); left: 0; }
#blb .pframe .blanc-marquee-gradient.right { background: linear-gradient(to left,#fff 0%,transparent 100%); right: 0; }
#blb .pframe .marquee-content {
  display: flex; align-items: center; gap: 28px;
  animation: blc-scroll 22s linear infinite; flex-shrink: 0;
}
#blb .pframe .marquee-content span { font-size: .72rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: #111; white-space: nowrap; }
#blb .pframe .marquee-content img { width: 14px; height: 14px; flex-shrink: 0; }
@keyframes blc-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* Detalhes */
#blb .pframe .blanc-section-details { padding-top: 56px; padding-bottom: 20px; }
#blb .pframe .blanc-grid-two { display: grid; grid-template-columns: 1fr 1fr; }
#blb .pframe .blanc-item-block1 h2 { font-size: 1.1rem; font-weight: 600; color: #111; }
#blb .pframe .blanc-item-header { display: flex; align-items: center; gap: 12px; padding-bottom: 10px; }
#blb .pframe .blanc-item-header img { width: 28px; height: 28px; }
#blb .pframe .blanc-item-header .icon-ph { width: 28px; height: 28px; background: #e5e5e5; border-radius: 50%; display: inline-block; flex-shrink: 0; }
#blb .pframe .blanc-list-details { padding-left: 40px; padding-right: 16px; }
#blb .pframe .blanc-list-ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
#blb .pframe .blanc-list-ul li { color: #595959; font-size: .85rem; line-height: 1.55; }
#blb .pframe .blanc-list-ul li strong { color: #111; font-weight: 600; }

/* Garantia */
#blb .pframe .blanc-section-guarantee { display: flex; width: 100%; padding-top: 36px; padding-bottom: 56px; }
#blb .pframe .blanc-guarantee-block-left {
  border: 1px solid #111; padding: 14px 18px; display: flex; width: fit-content;
  gap: 8px; align-items: center; flex-shrink: 0;
}
#blb .pframe .blanc-guarantee-block-left p { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; }
#blb .pframe .blanc-guarantee-block-left img { width: 14px; height: 14px; flex-shrink: 0; }
#blb .pframe .blanc-guarantee-block-right {
  flex: 1; background: #f4f4f4; padding: 14px 22px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
#blb .pframe .blanc-guarantee-block-right p { font-size: .83rem; color: #595959; line-height: 1.55; }
#blb .pframe .blanc-guarantee-block-right strong { color: #111; font-weight: 600; }
#blb .pframe .blanc-div-link { display: inline-flex; flex-direction: column; padding-bottom: 2px; border-bottom: 1px solid #595959; }
#blb .pframe .blanc-link { text-decoration: none; font-size: .7rem; color: #111; letter-spacing: .06em; font-weight: 600; white-space: nowrap; }

/* Destaques */
#blb .pframe .blanc-section-highlights { gap: 8px; padding-bottom: 56px; }
#blb .pframe .blanc-highlight-item { display: flex; flex-direction: column; gap: 12px; }
#blb .pframe .blanc-highlight-item h2 { font-size: .78rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; }
#blb .pframe .blanc-item-sticky { display: flex; flex-direction: column; gap: 12px; }
#blb .pframe .blanc-img-quadrada { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
#blb .pframe .blanc-text,
#blb .pframe .blanc-text2 { font-size: .82rem; line-height: 1.6; letter-spacing: .02em; color: #595959; max-width: 85%; }
#blb .pframe .blanc-text strong,
#blb .pframe .blanc-text2 strong { color: #111; font-weight: 600; }
#blb .pframe .video-ph {
  width: 100%; aspect-ratio: 1/1; background: #f2f2f2;
  display: flex; align-items: center; justify-content: center;
  color: #aaa; font-size: .78rem; font-style: italic; letter-spacing: .04em;
}

/* Banners Combine */
#blb .pframe .blanc-section-banners { padding: 40px 0 56px; }
#blb .pframe .blanc-banners-title { font-size: .62rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #111; margin-bottom: 10px; }
#blb .pframe .blanc-banners-grid { display: grid; gap: 8px; }
#blb .pframe .blanc-banners-grid.cols-2 { grid-template-columns: 1fr 1fr; }
#blb .pframe .blanc-banners-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
#blb .pframe .blanc-banner-card { display: block; text-decoration: none; border: 1px solid #ddd; }
#blb .pframe .blanc-banner-card img { width: 100%; height: auto; display: block; }
#blb .pframe .blanc-banner-card-ph { width: 100%; aspect-ratio: 3/4; background: #f2f2f2; display: flex; align-items: center; justify-content: center; font-size: .6rem; color: #aaa; font-style: italic; }

/* Destaques Noiva — Carousel */
#blb .pframe .blanc-carousel { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; }
#blb .pframe .bc-slide { position: absolute; inset: 0; }
#blb .pframe .bc-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
#blb .pframe .bc-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 36px; height: 36px; background: #fff; border: none; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; padding: 0;
}
#blb .pframe .bc-prev { left: 10px; }
#blb .pframe .bc-next { right: 10px; }
#blb .pframe .bc-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 0 10px 10px; display: flex; gap: 4px; z-index: 10; box-sizing: border-box;
}
#blb .pframe .bc-seg { flex: 1; height: 3px; background: rgba(255,255,255,.35); position: relative; overflow: hidden; }
#blb .pframe .bc-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0; background: #fff; }

/* FAQ */
#blb .pframe .blanc-section-faq { padding-top: 56px; padding-bottom: 56px; display: flex; flex-direction: column; }
#blb .pframe .blanc-section-faq h2 { font-size: .74rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 14px; }
#blb .pframe .blanc-grid-three { display: grid; grid-template-columns: 1fr 1fr 1fr; column-gap: 36px; }
#blb .pframe .blanc-faq-item { display: flex; flex-direction: column; }
#blb .pframe .blanc-faq-header {
  list-style: none; display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0; font-weight: 600; cursor: pointer; border-bottom: 1px solid #d5d5d5;
  font-size: .8rem; line-height: 1.5; letter-spacing: .01em; color: #595959; margin: 0;
  user-select: none;
}
#blb .pframe .blanc-faq-header::-webkit-details-marker { display: none; }
#blb .pframe .blanc-faq-icon { transition: transform .3s; display: inline-block; line-height: 1; margin-left: 8px; flex-shrink: 0; }
#blb .pframe .blanc-faq-item[open] .blanc-faq-icon { transform: rotate(45deg); }
#blb .pframe .blanc-faq-body { padding: 12px 0; color: #595959; font-size: .8rem; letter-spacing: .01em; line-height: 1.6; }

/* Para Presente */
#blb .pframe .blanc-section-gift { }
#blb .pframe .blanc-div-gift-text {
  display: flex; align-items: center; padding: 40px; gap: 20px;
  background: #ededed; aspect-ratio: 1/1;
}
#blb .pframe .blanc-wrapper-gift-text { display: flex; flex-direction: column; align-items: flex-start; gap: 22px; }
#blb .pframe .blanc-wrapper-gift-text h2 { font-family: 'Great Vibes', cursive; font-size: 2.4rem; font-weight: 400; color: #111; line-height: 1; }
#blb .pframe .blanc-div-gift-subtext { display: flex; flex-direction: column; gap: 6px; }
#blb .pframe .blanc-wrapper-gift-text h3 { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #111; }
#blb .pframe .blanc-wrapper-gift-text p { font-size: .8rem; letter-spacing: .02em; line-height: 1.6; color: #595959; }
</style>
</head>
<body>
<div id="blb">

  <header class="topbar">
    <div class="brand">
      <span class="brand-name">B L A N C</span>
      <span class="brand-sep"></span>
      <span class="brand-sub">Builder de Descrição</span>
    </div>
    <button class="btn-exp" onclick="BLB.openExport()">↗ Exportar código</button>
  </header>

  <div class="shell">

    <!-- LEFT SIDEBAR -->
    <aside class="sb-left">
      <div class="sb-hd">
        <div class="sb-lbl" style="margin-bottom:8px">Modelo de Produto</div>
        <div class="model-pick" id="blb-model-pick">
          <button class="mp-btn active" data-model="padrao"  onclick="BLB.setModel('padrao')">Padrão</button>
          <button class="mp-btn"        data-model="noiva"   onclick="BLB.setModel('noiva')">Noiva</button>
          <button class="mp-btn"        data-model="grinalda" onclick="BLB.setModel('grinalda')">Grinalda</button>
        </div>
        <div class="sb-lbl" style="margin-bottom:10px; margin-top:12px">Seções</div>
        <div class="add-wrap">
          <button class="btn-add-sec" onclick="BLB.toggleMenu()">+ Adicionar seção <span>▾</span></button>
          <div class="sec-menu" id="blb-smenu"></div>
        </div>
      </div>
      <div class="sec-list" id="blb-slist"></div>
    </aside>

    <!-- CENTER PREVIEW -->
    <main class="center">
      <div class="cbar">
        <div class="wdots">
          <span style="background:#ff5f57"></span>
          <span style="background:#febc2e"></span>
          <span style="background:#28c840"></span>
        </div>
        <span class="cbar-lbl">Preview — página do produto</span>
      </div>
      <div class="cbody">
        <div class="pframe" id="blb-preview"></div>
      </div>
    </main>

    <!-- RIGHT EDITOR -->
    <aside class="sb-right collapsed" id="blb-sbr">
      <div class="ed-hd">
        <span class="ed-hd-title" id="blb-ed-title">Editor</span>
      </div>
      <div class="ed-bd" id="blb-ed-body">
        <div class="ed-empty">Selecione uma seção para editar.</div>
      </div>
    </aside>

  </div>

  <!-- EXPORT MODAL -->
  <div class="eo" id="blb-eo" onclick="BLB.closeExpBg(event)">
    <div class="em">
      <div class="em-hd">
        <h2>Código gerado para Wbuy</h2>
        <div class="em-hd-r">
          <button class="btn-cp" id="blb-cpbtn" onclick="BLB.copyCode()">Copiar</button>
          <button class="btn-cx" onclick="BLB.closeExport()">✕</button>
        </div>
      </div>
      <div class="em-tabs">
        <button class="em-tab active" id="blb-tab-html" onclick="BLB.switchTab('html',this)">HTML</button>
        <div class="em-tabs-sep"></div>
        <span class="em-tabs-devlabel">Dev</span>
        <button class="em-tab-dev" id="blb-tab-css" onclick="BLB.switchTab('css',this)">CSS</button>
        <button class="em-tab-dev" id="blb-tab-js" onclick="BLB.switchTab('js',this)">JS</button>
        <button class="em-tab-dev" id="blb-tab-js2" onclick="BLB.switchTab('js2',this)">JS vídeo</button>
      </div>
      <div class="em-info" id="blb-em-info">
        ℹ Cole o <strong>HTML</strong> no campo Descrição do produto na Wbuy.
      </div>
      <div class="em-body">
        <div class="cw">
          <div class="ct"><span class="clang" id="blb-clang">HTML</span></div>
          <div class="ca" id="blb-ca"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="blb-toast"></div>
</div>

<script>
const BLB = (() => {
  // ───────────────────────────────────────────
  // META — tipos disponíveis
  // ───────────────────────────────────────────
  const META = {
    resumo:    { lbl: 'Resumo',         editable: true },
    detalhes:  { lbl: 'Detalhes',       editable: true },
    slide:     { lbl: 'Slide de Texto', editable: false },
    garantia:  { lbl: 'Garantia',       editable: false },
    destaques:      { lbl: 'Destaques',        editable: false },
    destaquesnoiva:      { lbl: 'Destaques Noiva',      editable: false },
    destaquesgrinalda:   { lbl: 'Destaques Grinaldas', editable: false },
    bannersnoiva:        { lbl: 'Banners Noiva',        editable: true  },
    bannersgrinalda:     { lbl: 'Banners Grinaldas',   editable: true  },
    faq:                 { lbl: 'FAQ',                  editable: false },
    presente:  { lbl: 'Para Presente',  editable: false },
  };

  // ───────────────────────────────────────────
  // UTILS
  // ───────────────────────────────────────────
  function uid() { return 'bi' + Date.now() + Math.floor(Math.random() * 9999); }
  function xe(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function toast(msg) {
    const t = document.getElementById('blb-toast');
    t.textContent = msg; t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 2200);
  }

  // ───────────────────────────────────────────
  // DEFAULT DATA por tipo
  // ───────────────────────────────────────────
  function defData(type) {
    if (type === 'resumo') return {
      text: 'O colar de p\u00e9rolas \u00e9 um cl\u00e1ssico que atravessa gera\u00e7\u00f5es, carregando hist\u00f3rias, promessas e mem\u00f3rias. Cada p\u00e9rola nasce no sil\u00eancio do tempo formada com delicadeza, paci\u00eancia e transforma\u00e7\u00e3o. Assim como as mulheres que a usam.'
    };
    if (type === 'detalhes') return {
      block1: {
        items: [
          { id: uid(), text: 'Semijoia Banhada a Ouro 18k ou R\u00f3dio Branco' },
          { id: uid(), text: 'Finalizada com Verniz que protege a pe\u00e7a contra oxida\u00e7\u00e3o e garante maior durabilidade' },
          { id: uid(), text: '<strong>Antial\u00e9rgica</strong>: livre de N\u00edquel e segura para sua pele 🤍' },
        ]
      },
      block2: {
        items: [
          { id: uid(), text: '16cm (Comprimento) + 4,5cm (Extensor)' },
          { id: uid(), text: 'Modelo ajust\u00e1vel que se adapta \u00e0 maioria dos pulsos.' },
        ]
      }
    };
    if (type === 'bannersnoiva') return {
      title: 'COMBINE SEU BRINCO COM',
      banners: [
        { id: uid(), label: 'PULSEIRAS', img: 'https://assets.ks-static.com.br/acessoriosblanc/description02/banner-pulseiras.webp', href: 'https://www.acessoriosblanc.com.br/pulseiras/' },
        { id: uid(), label: 'COLARES',   img: 'https://assets.ks-static.com.br/acessoriosblanc/description02/banner-colares.webp',   href: 'https://www.acessoriosblanc.com.br/colares/'   },
      ]
    };
    if (type === 'bannersgrinalda') return {
      title: 'COMBINE SUA GRINALDA COM',
      banners: [
        { id: uid(), label: 'PULSEIRAS', img: 'https://assets.ks-static.com.br/acessoriosblanc/description02/banner-pulseiras.webp', href: 'https://www.acessoriosblanc.com.br/pulseiras/' },
        { id: uid(), label: 'COLARES',   img: 'https://assets.ks-static.com.br/acessoriosblanc/description02/banner-colares.webp',   href: 'https://www.acessoriosblanc.com.br/colares/'   },
        { id: uid(), label: 'BRINCOS',   img: 'https://assets.ks-static.com.br/acessoriosblanc/description02/banner-brincos.webp',   href: 'https://www.acessoriosblanc.com.br/brincos/'   },
      ]
    };
    return {};
  }

  // ───────────────────────────────────────────
  // MODELOS DE PRODUTO
  // ───────────────────────────────────────────
  const MODEL_DEFS = {
    padrao:   ['resumo','slide','detalhes','garantia','destaques','faq','presente'],
    noiva:    ['resumo','slide','detalhes','garantia','destaquesnoiva','bannersnoiva','faq'],
    grinalda: ['resumo','slide','detalhes','garantia','destaquesgrinalda','bannersgrinalda','faq'],
  };

  let activeModel = 'padrao';

  function setModel(model) {
    if (!MODEL_DEFS[model]) return;
    activeModel = model;
    // atualiza botões
    document.querySelectorAll('#blb-model-pick .mp-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.model === model)
    );
    // reinicia seções com os tipos do modelo escolhido
    secs = MODEL_DEFS[model].map(type => ({ id: uid(), type, data: defData(type) }));
    activeId = null;
    renderMenu();
    renderSB();
    renderPreview();
    collapseEditor();
    toast('Modelo "' + { padrao:'Padrão', noiva:'Brincos de Noiva', grinalda:'Grinaldas' }[model] + '" ativado');
  }

  // ───────────────────────────────────────────
  // STATE — lista dinâmica de seções
  // ───────────────────────────────────────────
  let secs = [
    { id: uid(), type: 'resumo',    data: defData('resumo') },
    { id: uid(), type: 'slide',     data: {} },
    { id: uid(), type: 'detalhes',  data: defData('detalhes') },
    { id: uid(), type: 'garantia',  data: {} },
    { id: uid(), type: 'destaques', data: {} },
    { id: uid(), type: 'faq',       data: {} },
    { id: uid(), type: 'presente',  data: {} },
  ];

  let activeId = null;
  let expTab   = 'html';
  let dragSrc  = null;

  function gsec(id) { return secs.find(s => s.id === id); }

  // ───────────────────────────────────────────
  // SECTION OPS
  // ───────────────────────────────────────────
  function addSec(type) {
    closeMenu();
    const s = { id: uid(), type, data: defData(type) };
    secs.push(s);
    renderSB(); renderPreview();
    selectSec(s.id);
    toast('Seção "' + META[type].lbl + '" adicionada');
  }

  function delSec(id) {
    secs = secs.filter(s => s.id !== id);
    if (activeId === id) { activeId = secs.length ? secs[0].id : null; }
    renderSB(); renderPreview();
    if (activeId) selectSec(activeId); else collapseEditor();
  }

  function moveSec(id, dir) {
    const i = secs.findIndex(s => s.id === id);
    const ni = i + dir;
    if (ni < 0 || ni >= secs.length) return;
    [secs[i], secs[ni]] = [secs[ni], secs[i]];
    renderSB(); renderPreview();
  }

  // ───────────────────────────────────────────
  // SIDEBAR
  // ───────────────────────────────────────────
  function renderMenu() {
    const menu = document.getElementById('blb-smenu');
    menu.innerHTML = '';
    const allowed = MODEL_DEFS[activeModel] || Object.keys(META);
    Object.entries(META).forEach(([type, m]) => {
      if (!allowed.includes(type)) return;
      const el = document.createElement('div');
      el.className = 'sm-item';
      el.innerHTML = `
        <div class="sm-item-name">${xe(m.lbl)}</div>
        <span class="sm-item-tag ${m.editable ? 'ed' : 'fx'}">${m.editable ? 'Editável' : 'Fixo'}</span>`;
      el.addEventListener('click', () => addSec(type));
      menu.appendChild(el);
    });
  }

  function renderSB() {
    const list = document.getElementById('blb-slist');
    list.innerHTML = '';
    if (!secs.length) {
      list.innerHTML = '<div style="text-align:center;padding:20px 12px;color:#999;font-size:.75rem;font-style:italic">Nenhuma seção.<br>Clique em + Adicionar.</div>';
      return;
    }
    secs.forEach((s, i) => {
      const m = META[s.type];
      const el = document.createElement('div');
      el.className = `si${activeId === s.id ? ' active' : ''}`;
      el.draggable = true;
      el.innerHTML = `
        <span class="si-num">${i + 1}</span>
        <div class="si-info"><div class="si-name">${xe(m.lbl)}</div></div>
        <div class="si-acts">
          <button class="si-btn" title="Subir" onclick="event.stopPropagation();BLB.moveSec('${s.id}',-1)">▲</button>
          <button class="si-btn" title="Descer" onclick="event.stopPropagation();BLB.moveSec('${s.id}',1)">▼</button>
          <button class="si-btn del" title="Remover" onclick="event.stopPropagation();BLB.delSec('${s.id}')">✕</button>
        </div>`;
      el.addEventListener('click', () => selectSec(s.id));
      // drag & drop
      el.addEventListener('dragstart', ev => { dragSrc = s.id; ev.dataTransfer.effectAllowed = 'move'; });
      el.addEventListener('dragover',  ev => { ev.preventDefault(); el.style.outline = '2px solid #999'; });
      el.addEventListener('dragleave', () => el.style.outline = '');
      el.addEventListener('drop', ev => {
        ev.preventDefault(); el.style.outline = '';
        if (dragSrc === s.id) return;
        const si = secs.findIndex(x => x.id === dragSrc);
        const di = secs.findIndex(x => x.id === s.id);
        const [mv] = secs.splice(si, 1);
        secs.splice(di, 0, mv);
        renderSB(); renderPreview();
      });
      el.addEventListener('dragend', () => el.style.outline = '');
      list.appendChild(el);
    });
  }

  function selectSec(id) {
    activeId = id;
    renderSB();
    renderEditor();
    requestAnimationFrame(() => {
      const el = document.getElementById('blb-sec-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }

  function toggleMenu() { document.getElementById('blb-smenu').classList.toggle('open'); }
  function closeMenu()  { document.getElementById('blb-smenu').classList.remove('open'); }

  // ───────────────────────────────────────────
  // EDITOR
  // ───────────────────────────────────────────
  function renderEditor() {
    const s = gsec(activeId);
    if (!s) { collapseEditor(); return; }
    const m = META[s.type];
    document.getElementById('blb-sbr').classList.remove('collapsed');
    document.getElementById('blb-ed-title').textContent = m.lbl;
    const body = document.getElementById('blb-ed-body');
    body.innerHTML = '';
    if (s.type === 'resumo')    body.appendChild(buildResumoEditor(s));
    else if (s.type === 'detalhes') body.appendChild(buildDetalhesEditor(s));
    else if (s.type === 'bannersnoiva' || s.type === 'bannersgrinalda') body.appendChild(buildBannersEditor(s));
    else body.appendChild(buildFixedNotice());
  }

  function collapseEditor() {
    document.getElementById('blb-sbr').classList.add('collapsed');
    document.getElementById('blb-ed-body').innerHTML =
      '<div class="ed-empty">Selecione uma seção para editar.</div>';
  }

  // Resumo editor
  function buildResumoEditor(s) {
    const frag = document.createDocumentFragment();
    const panel = mkPanel('Texto do resumo');
    panel.querySelector('.ep-bd').innerHTML = `
      <div class="fr">
        <label class="lb">Parágrafo</label>
        <div class="rte-wrap">
          <div class="rte-toolbar">
            <button class="rte-btn" data-cmd="bold"   title="Negrito (Ctrl+B)"><strong>B</strong></button>
            <button class="rte-btn" data-cmd="italic" title="Itálico (Ctrl+I)"><em>I</em></button>
            <div class="rte-sep"></div>
            <button class="rte-btn" data-cmd="removeFormat" title="Remover formatação">✕</button>
          </div>
          <div class="rte-body" id="blb-resumo-${s.id}" contenteditable="true" data-placeholder="Digite o texto do resumo…"></div>
        </div>
        <p class="hint">Enter = quebra de linha • Ctrl+B negrito • Ctrl+I itálico</p>
      </div>`;
    frag.appendChild(panel);
    requestAnimationFrame(() => {
      const body = document.getElementById('blb-resumo-' + s.id);
      if (!body) return;
      body.innerHTML = s.data.text || '';
      const toolbar = panel.querySelector('.rte-toolbar');
      const btns    = toolbar.querySelectorAll('.rte-btn[data-cmd]');

      function syncData() {
        // Normaliza: troca <div> de quebra de linha do Chrome por <br>
        s.data.text = body.innerHTML
          .replace(/<div><br\s*\/?><\/div>/gi, '<br>')
          .replace(/<div>(.*?)<\/div>/gi, '<br>$1')
          .replace(/^<br>/, '');
        renderPreview();
      }

      function updateToolbar() {
        btns.forEach(btn => {
          const cmd = btn.dataset.cmd;
          if (cmd === 'removeFormat') return;
          btn.classList.toggle('active', document.queryCommandState(cmd));
        });
      }

      body.addEventListener('input',  () => { syncData(); updateToolbar(); });
      body.addEventListener('keyup',  updateToolbar);
      body.addEventListener('mouseup', updateToolbar);
      body.addEventListener('focus',   updateToolbar);

      btns.forEach(btn => {
        btn.addEventListener('mousedown', e => {
          e.preventDefault(); // mantém foco no editor
          document.execCommand(btn.dataset.cmd, false, null);
          syncData();
          updateToolbar();
          body.focus();
        });
      });
    });
    return frag;
  }

  // Detalhes editor — ícone e título são fixos, só itens editáveis
  function buildDetalhesEditor(s) {
    const frag = document.createDocumentFragment();
    const BLOCK_LABELS = ['Material', 'Dimensões'];
    ['block1', 'block2'].forEach((blk, idx) => {
      const panel = mkPanel(BLOCK_LABELS[idx]);
      panel.querySelector('.ep-bd').innerHTML = `
        <div class="fr">
          <label class="lb">Itens da lista</label>
          <div class="rl" id="blb-${blk}-${s.id}-items"></div>
          <button class="btn-ai" onclick="BLB.addItem('${s.id}','${blk}')">+ Adicionar item</button>
          <p class="hint" style="margin-top:5px">Suporta HTML (ex: &lt;strong&gt;texto&lt;/strong&gt;)</p>
        </div>`;
      frag.appendChild(panel);
    });
    requestAnimationFrame(() => {
      renderItemsList(s.id, 'block1');
      renderItemsList(s.id, 'block2');
    });
    return frag;
  }

  function renderItemsList(secId, blk) {
    const s = gsec(secId);
    if (!s) return;

  function initCarousels() {
    document.querySelectorAll('#blb-preview .blanc-carousel').forEach(el => {
      if (el._bcInit) return;
      el._bcInit = true;
      const slides = Array.from(el.querySelectorAll('.bc-slide'));
      const fills  = Array.from(el.querySelectorAll('.bc-fill'));
      const n = slides.length;
      if (!n) return;
      const INTERVAL = 4000, DUR = 600;
      let cur = 0, prog = 0, lastTs = null, rafId = null;

      slides.forEach((s, i) => {
        s.style.transition = `transform ${DUR}ms ease-in-out, opacity ${DUR * .5}ms`;
        s.style.transform  = i === 0 ? 'translateX(0)' : 'translateX(100%)';
        s.style.opacity    = i === 0 ? '1' : '0';
      });

      function go(next, dir) {
        const prev = cur;
        cur = next; prog = 0; lastTs = null;
        slides[prev].style.transform = `translateX(${dir > 0 ? '-100%' : '100%'})`;
        slides[prev].style.opacity   = '0';
        slides[next].style.transform = 'translateX(0)';
        slides[next].style.opacity   = '1';
        fills.forEach((f, i) => { if (i !== cur) f.style.width = '0'; });
      }

      function tick(ts) {
        if (!lastTs) lastTs = ts;
        prog += (ts - lastTs) / INTERVAL * 100;
        lastTs = ts;
        if (fills[cur]) fills[cur].style.width = Math.min(prog, 100) + '%';
        if (prog >= 100) go((cur + 1) % n, 1);
        rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);

      const obs = new MutationObserver(() => {
        if (!document.contains(el)) { cancelAnimationFrame(rafId); obs.disconnect(); }
      });
      obs.observe(document.body, { childList: true, subtree: true });

      el.querySelector('.bc-prev')?.addEventListener('click', () => go((cur - 1 + n) % n, -1));
      el.querySelector('.bc-next')?.addEventListener('click', () => go((cur + 1) % n, 1));
    });
  }

            (function() {
                const el = document.getElementById('bc-noiva');
                if (!el) return;
                const slides = Array.from(el.querySelectorAll('.bc-slide'));
                const fills  = Array.from(el.querySelectorAll('.bc-fill'));
                const btns   = el.querySelectorAll('button');
                const INTERVAL = 4000, DUR = 600;
                let cur = 0, prog = 0, lastTs = null;
                slides.forEach((s, i) => {
                    s.style.cssText += \`;position:absolute;inset:0;transition:transform \${DUR}ms ease-in-out,opacity \${DUR * .5}ms;transform:\${i === 0 ? 'translateX(0)' : 'translateX(100%)'};opacity:\${i === 0 ? '1' : '0'};\`;
                });
                function go(next, dir) {
                    const prev = cur; cur = next; prog = 0; lastTs = null;
                    slides[prev].style.transform = \`translateX(\${dir > 0 ? '-100%' : '100%'})\`;
                    slides[prev].style.opacity = '0';
                    slides[next].style.transform = 'translateX(0)';
                    slides[next].style.opacity = '1';
                    fills.forEach((f, i) => { if (i !== cur) f.style.width = '0'; });
                }
                function tick(ts) {
                    if (!lastTs) lastTs = ts;
                    prog += (ts - lastTs) / INTERVAL * 100; lastTs = ts;
                    if (fills[cur]) fills[cur].style.width = Math.min(prog, 100) + '%';
                    if (prog >= 100) go((cur + 1) % slides.length, 1);
                    requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);
                btns[0].addEventListener('click', () => go((cur - 1 + slides.length) % slides.length, -1));
                btns[1].addEventListener('click', () => go((cur + 1) % slides.length, 1));
            })();

  function genJS2() {
    return '<script>\n' +
'  document.addEventListener(\'DOMContentLoaded\', () => {\n' +
'    const video = document.getElementById(\'video-blanc\');\n' +
'    if (!video) return;\n\n' +
'    video.muted = true;\n' +
'    video.defaultMuted = true;\n' +
'    video.playsInline = true;\n\n' +
'    const iniciarVideo = () => {\n' +
'      const playPromise = video.play();\n' +
'      if (playPromise !== undefined) {\n' +
'        playPromise.catch((err) => {\n' +
'          console.warn(\'Autoplay bloqueado. Tentando novamente no primeiro toque.\', err);\n' +
'          document.addEventListener(\'touchstart\', () => video.play(), { once: true });\n' +
'        });\n' +
'      }\n' +
'    };\n\n' +
'    iniciarVideo();\n' +
'  });\n' +
'<\/script>';
  }

  // ───────────────────────────────────────────

  const TAB_INFO = {
    html: 'ℹ Cole o <strong>HTML</strong> no campo Descrição do produto na Wbuy.',
    css:  '⚙ <strong>Referência dev</strong> — CSS personalizado. Cole no campo de CSS da Wbuy (configurado pela agência).',
    js:   '⚙ <strong>Referência dev</strong> — JS (renderCustomWidgets). Cole no campo de JavaScript da Wbuy. Requer jQuery.',
    js2:  '⚙ <strong>Referência dev</strong> — JS do vídeo. Cole no campo de JavaScript da Wbuy junto com o JS principal.',
  };

  function openExport() {
    expTab = 'html';
    document.querySelectorAll('#blb .em-tab, #blb .em-tab-dev').forEach(t => t.classList.remove('active'));
    document.getElementById('blb-tab-html').classList.add('active');
    document.getElementById('blb-clang').textContent = 'HTML';
    document.getElementById('blb-em-info').innerHTML = TAB_INFO.html;
    document.getElementById('blb-ca').textContent = genHTML();
    document.getElementById('blb-eo').classList.add('open');
  }

  function switchTab(tab, btn) {
    expTab = tab;
    document.querySelectorAll('#blb .em-tab, #blb .em-tab-dev').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const labels = { html: 'HTML', css: 'CSS', js: 'JavaScript', js2: 'JavaScript (vídeo)' };
    document.getElementById('blb-clang').textContent = labels[tab];
    const infoEl = document.getElementById('blb-em-info');
    infoEl.innerHTML = TAB_INFO[tab];
    infoEl.classList.toggle('dev', tab !== 'html');
    let code = '';
    if (tab === 'html')      code = genHTML();
    else if (tab === 'css')  code = genCSS();
    else if (tab === 'js')   code = genJS();
    else if (tab === 'js2')  code = genJS2();
    document.getElementById('blb-ca').textContent = code;
  }

  function closeExport() { document.getElementById('blb-eo').classList.remove('open'); }
  function closeExpBg(e) { if (e.target === document.getElementById('blb-eo')) closeExport(); }

  function copyCode() {
    navigator.clipboard.writeText(document.getElementById('blb-ca').textContent).then(() => {
      const b = document.getElementById('blb-cpbtn');
      b.textContent = '✓ Copiado'; b.classList.add('ok');
      toast('Código copiado!');
      setTimeout(() => { b.textContent = 'Copiar'; b.classList.remove('ok'); }, 2200);
    });
  }

  });

  return {
    openExport, closeExport, closeExpBg, switchTab, copyCode,
    addItem, remItem,

    setModel,
  };
